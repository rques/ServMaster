<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServMaster - Login Colaborador</title>
    <link rel="stylesheet" href="./colaborador.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <main class="login-card">
        <a href="../index.html" class="back-link">
            <i class="fa-solid fa-angle-left"></i> VOLTAR
        </a>
        
        <div class="logo-wrapper">
            <img src="../img/logo-sem_fundo.png" alt="Logo ServMaster" class="logo" onerror="this.src='https://via.placeholder.com/70x70?text=SM'">
        </div>
        
        <h1 class="title">Login Colaborador</h1>
        <p class="subtitle">Aceda à sua conta corporativa</p>

        <form id="login-form">
            <div class="input-group">
                <label for="matricula">MATRÍCULA</label>
                <input type="text" id="matricula" name="matricula" placeholder="Digite sua matrícula" autocomplete="off" required>
                <span class="error-message" id="error-msg" style="display: none;">Matrícula inválida. Use apenas números.</span>
            </div>

            <button type="submit" class="btn-solid" id="submit-btn">Entrar Agora</button>
        </form>
    </main>

    <!-- Scripts principais e o gerador do Modal -->
    <script src="./colaborador.js"></script>
    <script src="../modal/modal.js"></script>
</body>
</html>
